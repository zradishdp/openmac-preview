<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Watchlist Detail</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"><style>body{margin:0;font-family:Inter,'Noto Sans SC',sans-serif;background:#f6f8fc;color:#101828}.container{max-width:860px;margin:0 auto;padding:28px 20px 60px}.back{display:inline-block;margin-bottom:20px;color:#2563eb;font-weight:700;text-decoration:none}.tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#ede9fe;color:#6d28d9;font-size:12px;font-weight:700}.title{font-size:clamp(2rem,4vw,3.4rem);line-height:1.02;letter-spacing:-.04em;margin:14px 0 12px}.lead{color:#667085;line-height:1.75;font-size:1.05rem}.panel{background:#fff;border:1px solid #d9e2f1;border-radius:18px;padding:18px;margin-top:18px;box-shadow:0 10px 30px rgba(16,24,40,.08)}p,li{line-height:1.75;color:#475467}ul{padding-left:18px}</style></head><body><div class="container"><a class="back" href="../index.html">← 返回首页</a><span class="tag">Watchlist</span><div class="title">在高噪音信息流里，更应该追踪“长期预测能力”，而不是单次高光表达。</div><p class="lead">Swyx、Karpathy 这一类账号的价值，很多时候不在于今天这条 tweet 本身，而在于他们是否长期输出经得起时间检验的判断。研究上，这比追热点更值钱。</p><div class="panel"><ul><li>把人按“预测命中率 / 信噪比 / 持续性”而不是粉丝量来分层。</li><li>当一条内容信息密度不高时，别急着丢，先判断作者是否值得长期跟踪。</li><li>账号价值不仅在内容本身，也在其作为“长期观察对象”的属性。</li></ul></div><div class="panel"><p>这对研究系统的意义很直接：你要建立的不是一个信息收藏夹，而是一套可持续跟踪“谁值得信”的观察池。</p></div></div></body></html>
